<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet" type="text/css">
  <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
  <title>Todo App</title>
</head>
<body class="body">
  <header>
    <div class="description">
      <img class="description__image" src="./eisenhower-matrix.jpg">
      <a class="description__link"
          href="https://goal-life.com/page/method/matrix-eisenhower">
          Want more details?
      </a>
    </div>
  </header>
  <main>
    <div class="todo-block todo-block_margin">
      <h3 class="todo-block__title todo-block__title_margin">
        Add Item
      </h3>
      <div class="todo-block__row-wrapper">
        <input class="todo-block__task todo-block__text-input" id="new-task" type="text">
        <button class="todo-block__button">Add</button>
      </div>
      <h3 class="todo-block__title todo-block__title_margin">
        Todo
      </h3>
      <ul class="todo-block__ul-container_margin" id="incomplete-tasks">
        <li class="todo-block__list">
          <input class="todo-block__checkbox_margin" type="checkbox">
          <span class="todo-block__task todo-block__span">Pay Bills</span>
          <input class="todo-block__text-input" type="text">
          <button class="todo-block__button todo-block__button_edit">Edit</button>
          <button class="todo-block__button todo-block__button_delete">
            <img class="todo-block__delete-img" src="./remove.svg">
          </button>
        </li>
        <li class="todo-block__list todo-block__list_edit-mode">
          <input class="todo-block__checkbox_margin" type="checkbox">
          <span class="todo-block__task todo-block__span">Go Shopping</span>
          <input class="todo-block__text-input" type="text" value="Go Shopping">
          <button class="todo-block__button todo-block__button_edit">Save</button>
          <button class="todo-block__button todo-block__button_delete">
            <img class="todo-block__delete-img" src="./remove.svg">
          </button>
        </li>
      </ul>
      <h3 class="todo-block__title todo-block__title_margin">
        Completed
      </h3>
      <ul class="todo-block__ul-container_margin todo-block__ul-container_strikeout" id="completed-tasks">
        <li class="todo-block__list">
          <input class="todo-block__checkbox_margin" type="checkbox" checked>
          <span class="todo-block__task todo-block__span">See the Doctor</span>
          <input class="todo-block__text-input" type="text">
          <button class="todo-block__button todo-block__button_edit">Edit</button>
          <button class="todo-block__button todo-block__button_delete">
            <img class="todo-block__delete-img" src="./remove.svg">
          </button>
        </li>
      </ul>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
